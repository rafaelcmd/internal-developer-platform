include:
  - api/docker-compose.dev.yaml
  - ./services/provisioner/docker-compose.dev.yaml

services:
  kafka:
    # Pinned to 7.x: CP 8.x images are KRaft-only and reject KAFKA_ZOOKEEPER_CONNECT.
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    ports: []
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9092" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - zookeeper
    networks:
      - internal-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: zookeeper
    ports: []
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # Persist ZooKeeper state so its cluster.id survives container recreation.
    # Without this ZooKeeper is ephemeral while kafka-data is durable, so a
    # recreated ZooKeeper mints a fresh cluster.id and Kafka then aborts with an
    # "Invalid cluster.id in meta.properties" mismatch against the old volume.
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - internal-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - public-network
      - internal-network

  # Vendor-agnostic telemetry seam for local dev. Receives OTLP from the services
  # and scrapes the API's /metrics; prints via the debug exporter and re-exposes
  # metrics on :8889. Config: ./otel-collector.dev.yaml. Pinned to match the k8s
  # collector image.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.dev.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (point host-run services here)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exposition (curl http://localhost:8889/metrics)
    networks:
      - public-network
      - internal-network

networks:
  internal-network:
    driver: bridge
  public-network:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
