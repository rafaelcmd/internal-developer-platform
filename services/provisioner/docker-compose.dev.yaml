services:
  resource-provisioner-consumer:
    container_name: resource-provisioner-consumer
    build:
      args:
        - GO_VERSION=${GO_VERSION:-1.25}
      context: .
      dockerfile: Dockerfile.dev
    ports: [ ]
    environment:
      # Kafka is the local-dev transport: with brokers set the consumer reads
      # from Kafka and never touches AWS. Must match the API's KAFKA_TOPIC.
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=resource-provisioning
      - ENVIRONMENT=local
      # OTLP egress to the dev Collector. Setup is a no-op if these are unset,
      # so they are what turns the provisioner's telemetry on locally.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
    depends_on:
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - internal-network
    restart: on-failure