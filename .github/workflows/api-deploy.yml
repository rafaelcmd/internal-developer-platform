name: API - Deploy to EKS

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      DD_API_KEY:
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  EKS_CLUSTER_NAME: internal-developer-platform-cluster
  SSM_PARAM_NAME: /internal-developer-platform/shared/ecr/internal-developer-platform-repo/repository_url

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy API to EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch ECR URL from SSM Parameter Store
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "${{ env.SSM_PARAM_NAME }}" \
            --query 'Parameter.Value' \
            --output text)
          echo "ECR_URL=$ECR_URL" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=$(echo "$ECR_URL" | cut -d/ -f1)" >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push API image
        working-directory: api
        run: |
          docker build \
            --platform linux/amd64 \
            -f Dockerfile.dev \
            -t "$ECR_URL:api-latest" \
            -t "$ECR_URL:api-${{ github.sha }}" \
            .
          docker push "$ECR_URL:api-latest"
          docker push "$ECR_URL:api-${{ github.sha }}"

      - name: Substitute ECR URL in deployment manifest
        run: sed -i "s|PLACEHOLDER-ECR-REPO|${ECR_URL}|g" k8s/api/deployment.yaml

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Create or update datadog-api-key Secret
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
        run: |
          kubectl create secret generic datadog-api-key \
            --from-literal=api-key="$DD_API_KEY" \
            --namespace=default \
            --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/api/deployment.yaml
          kubectl apply -f k8s/api/service.yaml

      - name: Wait for NLB to be provisioned
        run: |
          echo "Waiting for NLB 'idp-api-nlb' to be provisioned by the AWS Load Balancer Controller..."
          for i in $(seq 1 24); do
            NLB_STATE=$(aws elbv2 describe-load-balancers \
              --names idp-api-nlb \
              --query 'LoadBalancers[0].State.Code' \
              --output text 2>/dev/null || echo "not-found")
            if [ "$NLB_STATE" = "active" ]; then
              echo "NLB is active."
              exit 0
            fi
            echo "NLB state: ${NLB_STATE}. Retrying in 15s... ($i/24)"
            sleep 15
          done
          echo "ERROR: NLB was not active after 6 minutes."
          exit 1
