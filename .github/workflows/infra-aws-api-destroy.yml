name: API - Destroy AWS Infrastructure

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      TF_API_TOKEN:
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

permissions:
  id-token: write
  contents: read

jobs:
  destroy-infrastructure:
    name: Destroy AWS Infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/live/provisioner_api/dev
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Delete API Service to drain NLB before destroy
        run: |
          aws eks update-kubeconfig --name internal-developer-platform-cluster --region "${{ env.AWS_REGION }}"
          kubectl delete service internal-developer-platform-api -n default --ignore-not-found
          echo "Waiting for NLB 'idp-api-nlb' to be deleted by the AWS Load Balancer Controller..."
          for i in $(seq 1 24); do
            NLB_COUNT=$(aws elbv2 describe-load-balancers \
              --names idp-api-nlb \
              --query 'length(LoadBalancers)' \
              --output text 2>/dev/null || echo "0")
            if [ "$NLB_COUNT" = "0" ]; then
              echo "NLB deleted."
              break
            fi
            echo "NLB still exists. Waiting 15s... ($i/24)"
            sleep 15
          done

      - name: Terraform Plan Destroy
        run: terraform plan -destroy -input=false -var-file=dev.tfvars

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=dev.tfvars
