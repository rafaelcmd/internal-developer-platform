name: API Gateway - Create AWS Infrastructure

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      TF_API_TOKEN:
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

permissions:
  id-token: write
  contents: read

jobs:
  create-infrastructure:
    name: Create AWS Infrastructure
    runs-on: ubuntu-latest

    outputs:
      api_gateway_invoke_url: ${{ steps.terraform_output.outputs.api_gateway_invoke_url }}

    defaults:
      run:
        working-directory: infra/live/provisioner_api_gateway/dev
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=dev.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file=dev.tfvars
