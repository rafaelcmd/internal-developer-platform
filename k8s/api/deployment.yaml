apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-developer-platform-api
  namespace: default
  labels:
    app: internal-developer-platform-api
    "tags.datadoghq.com/service": resource-provisioner-api
    "tags.datadoghq.com/env": dev
    "tags.datadoghq.com/version": "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: internal-developer-platform-api
  template:
    metadata:
      labels:
        app: internal-developer-platform-api
        "tags.datadoghq.com/service": resource-provisioner-api
        "tags.datadoghq.com/env": dev
        "tags.datadoghq.com/version": "1.0.0"
      # The OTel Collector's prometheus receiver scrapes pods carrying these
      # annotations, bridging the API's existing OTel->Prometheus /metrics
      # endpoint into the vendor-agnostic pipeline (no scrape config per pod).
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: internal-developer-platform-api
      # No Datadog sidecar: traces, metrics, and logs now leave the app as OTLP
      # to the OTel Collector (observability namespace), which owns all backend
      # routing including Datadog. See k8s/otel-collector.
      containers:
        - name: internal-developer-platform-api
          image: PLACEHOLDER-ECR-REPO:api-latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              value: dev
            # Identity — becomes the OTel resource (service.name / service.version
            # / deployment.environment), which the Collector's datadog exporter
            # maps onto Datadog's service / version / env unified tags.
            - name: SERVICE_NAME
              value: resource-provisioner-api
            - name: SERVICE_VERSION
              value: "1.0.0"
            # OTLP egress to the Collector. Plaintext is fine in-cluster; the
            # SDK's trace and log exporters both read these standard vars.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
