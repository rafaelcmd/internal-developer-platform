apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: default
  labels:
    app: redis
spec:
  # ClusterIP so the API resolves redis.default.svc.cluster.local:6379 —
  # the same endpoint published to SSM at /INTERNAL_DEVELOPER_PLATFORM/REDIS_ADDR.
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
