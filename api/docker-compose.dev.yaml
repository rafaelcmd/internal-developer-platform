services:
  internal-developer-platform-api:
    container_name: internal-developer-platform-api
    build:
      args:
        - GO_VERSION=${GO_VERSION:-1.25}
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=local
      - PORT=5000
      # Local mode publishes /v1/provision requests to Kafka instead of SQS, so
      # the full API -> queue -> provisioner flow runs offline without AWS.
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=resource-provisioning
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - public-network
      - internal-network
    restart: on-failure